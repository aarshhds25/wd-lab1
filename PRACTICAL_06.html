
<html >
<head>
    <title>Scholarship Application Form</title>
</head>
<body>

    <h2>Scholarship Application Form</h2>

    <form>

       
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>

   
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label>
        <br><br>

        <label for="eligibility">Are you eligible for the scholarship?</label>
        <input type="checkbox" id="eligibility" name="eligibility" value="Yes">
        <br><br>

        
        <label for="scholarship-type">Scholarship Type:</label><br>
        <input type="checkbox" id="undergraduate" name="scholarship_type" value="Undergraduate">
        <label for="undergraduate">Undergraduate</label><br>
        <input type="checkbox" id="postgraduate" name="scholarship_type" value="Postgraduate">
        <label for="postgraduate">Postgraduate</label><br>
 
       
        <br><br>
     <button type="submit">Submit</button>

    </form>
</body>
</html>
